name: Refresh Festival Data

on:
  schedule:
    # Daily at 9am UTC — refresh.py decides which festivals actually get checked
    - cron: '0 9 * * *'
    # Quarterly (1st of Jan, Apr, Jul, Oct) — Oscar qualifying sync
    - cron: '0 9 1 1,4,7,10 *'
  workflow_dispatch:
    # Also manually triggerable from GitHub Actions UI
    inputs:
      dry_run:
        description: 'Dry run (no writes to Supabase)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run refresh script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/refresh.py

      - name: Run Oscar qualifying update (quarterly)
        if: github.event.schedule == '0 9 1 1,4,7,10 *'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/scrape_oscars.py
